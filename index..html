<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-lg shadow-lg w-96">
        <h2 class="text-2xl font-bold text-center mb-6">
            Registration Form
        </h2>

        <form id="registerForm">
            
            <div class="mb-4">
                <label class="block mb-1 font-medium">Name</label>
                <input type="text" id="name"
                    class="w-full border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="Enter your name" />
                <p id="nameError" class="text-red-500 text-sm mt-1"></p>
            </div>

            <!-- Email -->
            <div class="mb-4">
                <label class="block mb-1 font-medium">Email</label>
                <input type="email" id="email"
                    class="w-full border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="Enter your email" />
                <p id="emailError" class="text-red-500 text-sm mt-1"></p>
            </div>

            <!-- Password -->
            <div class="mb-4">
                <label class="block mb-1 font-medium">Password</label>
                <input type="password" id="password"
                    class="w-full border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="Enter password" />
                <p id="passwordError" class="text-red-500 text-sm mt-1"></p>
            </div>

            <!-- Submit Button   -->
            <button type="button" id="submitBtn" class="w-full bg-blue-500 text-white py-2 rounded"
                onclick="validateForm()">
                Register
            </button>
        </form>
    </div>

    <script>
        const nameInput = document.getElementById("name");
        const emailInput = document.getElementById("email");
        const passwordInput = document.getElementById("password");
        const submitBtn = document.getElementById("submitBtn");

        function validateForm() {
            // Name Validation
            if (nameInput.value.trim() === "") {
                document.getElementById("nameError").innerText =
                    "Name is required";
            } else {
                document.getElementById("nameError").innerText = "";
            }

            // Email Validation
            const emailPattern =
                /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (!emailPattern.test(emailInput.value.trim())) {
                document.getElementById("emailError").innerText =
                    "Enter a valid email address";

            } else {
                document.getElementById("emailError").innerText = "";
            }

            // Password Validation
            if (passwordInput.value.length < 6) {
                document.getElementById("passwordError").innerText =
                    "Password must be at least 6 characters";
            } else {
                document.getElementById("passwordError").innerText = "";
            }

        }

        nameInput.addEventListener("input", validateForm);
        emailInput.addEventListener("input", validateForm);
        passwordInput.addEventListener("input", validateForm);

    </script>

</body>

</html>
